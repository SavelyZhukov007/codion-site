<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#61DAFB"/>
      <stop offset="100%" stop-color="#21a1f1"/>
    </linearGradient>
    <filter id="rglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Atom orbits -->
  <ellipse cx="50" cy="50" rx="45" ry="18" stroke="url(#rg)" stroke-width="2" fill="none" opacity="0.8" filter="url(#rglow)"/>
  <ellipse cx="50" cy="50" rx="45" ry="18" stroke="url(#rg)" stroke-width="2" fill="none" opacity="0.8" transform="rotate(60 50 50)" filter="url(#rglow)"/>
  <ellipse cx="50" cy="50" rx="45" ry="18" stroke="url(#rg)" stroke-width="2" fill="none" opacity="0.8" transform="rotate(120 50 50)" filter="url(#rglow)"/>
  <!-- Core -->
  <circle cx="50" cy="50" r="7" fill="url(#rg)" filter="url(#rglow)"/>
  <!-- Electron dots -->
  <circle cx="95" cy="50" r="3.5" fill="#61DAFB"/>
  <circle cx="27.5" cy="18" r="3.5" fill="#61DAFB" opacity="0.7"/>
  <circle cx="27.5" cy="82" r="3.5" fill="#61DAFB" opacity="0.5"/>
</svg>